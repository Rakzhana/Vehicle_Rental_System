{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card border-0 shadow-lg rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-4">

                        <div class="bg-success rounded-circle d-inline-flex justify-content-center align-items-center"
                             style="width:80px;height:80px;">

                            <i class="bi bi-person-plus-fill text-white fs-1"></i>

                        </div>

                        <h2 class="fw-bold mt-3">

                            Create Your Account

                        </h2>

                        <p class="text-muted">

                            Register to start renting vehicles.

                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-semibold">

                                    Username

                                </label>

                                {{ form.username }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-semibold">

                                    Email

                                </label>

                                {{ form.email }}

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-semibold">

                                    Password

                                </label>

                                {{ form.password1 }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label fw-semibold">

                                    Confirm Password

                                </label>

                                {{ form.password2 }}

                            </div>

                        </div>

                        <button class="btn btn-success w-100 py-2 mt-3">

                            <i class="bi bi-person-check-fill"></i>

                            Create Account

                        </button>

                    </form>

                    <hr>

                    <p class="text-center mb-0">

                        Already have an account?

                        <a href="{% url 'login' %}" class="fw-bold">

                            Login

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
